services:
  - type: web
    name: mmn-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # you'll paste this manually in Render dashboard
      - key: JWT_SECRET
        sync: false        # you'll paste this manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false        # set to your frontend URL after deploying frontend
      - key: PORT
        value: 4000
